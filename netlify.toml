[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/watermark/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Resource-Policy = "same-origin"

[[redirects]]
  from = "/pindou"
  to = "/pindou/"
  status = 301

[[redirects]]
  from = "/home"
  to = "/pindou/home"
  status = 301

[[redirects]]
  from = "/workspace"
  to = "/pindou/workspace"
  status = 301

[[redirects]]
  from = "/editor"
  to = "/pindou/editor"
  status = 301

[[redirects]]
  from = "/focus"
  to = "/pindou/focus"
  status = 301

[[redirects]]
  from = "/projects"
  to = "/pindou/projects"
  status = 301

[[redirects]]
  from = "/gallery"
  to = "/pindou/gallery"
  status = 301

[[redirects]]
  from = "/gallery/*"
  to = "/pindou/gallery/:splat"
  status = 301

[[redirects]]
  from = "/preview3d"
  to = "/pindou/preview3d"
  status = 301

[[redirects]]
  from = "/palette"
  to = "/pindou/palette"
  status = 301

[[redirects]]
  from = "/text"
  to = "/pindou/text"
  status = 301

[[redirects]]
  from = "/guide"
  to = "/pindou/guide"
  status = 301

[[redirects]]
  from = "/bead-core"
  to = "/pindou/bead-core"
  status = 301

[[redirects]]
  from = "/static/*"
  to = "/pindou/static/:splat"
  status = 301

[[redirects]]
  from = "/pindou/*"
  to = "https://dandanpindou.netlify.app/pindou/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/watermark/*"
  to = "https://dandan-watermark.netlify.app/watermark/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
